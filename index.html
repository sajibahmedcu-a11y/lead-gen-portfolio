<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Capture &amp; Scoring Tool | Sajib Ahmed</title>
  <meta name="description" content="A real interactive lead management app: capture, auto-score, filter, search and export B2B leads. Built by Sajib Ahmed." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="app-bar">
    <div class="wrap bar-inner">
      <a href="../../index.html" class="back"><i class="fa-solid fa-arrow-left"></i> Portfolio</a>
      <h1><i class="fa-solid fa-bolt"></i> Lead Manager</h1>
      <button id="themeToggle" class="icon-btn" aria-label="theme"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>

  <main class="wrap">
    <!-- Stats -->
    <section class="stats" id="stats">
      <div class="stat"><span class="stat-label">Total Leads</span><strong id="stTotal">0</strong></div>
      <div class="stat hot"><span class="stat-label">Hot 🔥</span><strong id="stHot">0</strong></div>
      <div class="stat warm"><span class="stat-label">Warm</span><strong id="stWarm">0</strong></div>
      <div class="stat cold"><span class="stat-label">Cold</span><strong id="stCold">0</strong></div>
      <div class="stat"><span class="stat-label">Avg. Score</span><strong id="stAvg">0</strong></div>
    </section>

    <div class="grid">
      <!-- Add form -->
      <section class="panel">
        <h2><i class="fa-solid fa-user-plus"></i> Add Lead</h2>
        <form id="leadForm" class="lead-form">
          <label>Full Name *<input name="name" required placeholder="Jane Cooper" /></label>
          <label>Email *<input name="email" type="email" required placeholder="jane@company.com" /></label>
          <label>Company<input name="company" placeholder="Acme Inc." /></label>
          <label>Job Title<input name="title" placeholder="VP of Marketing" /></label>
          <label>Source
            <select name="source">
              <option>LinkedIn</option><option>Website</option><option>Referral</option><option>Cold Email</option><option>Event</option><option>Other</option>
            </select>
          </label>
          <label>Budget (USD)<input name="budget" type="number" min="0" placeholder="5000" /></label>
          <label class="full">Notes<textarea name="notes" rows="2" placeholder="Interested in Q3 campaign..."></textarea></label>
          <p class="hint">Score is calculated automatically from title, budget &amp; source.</p>
          <button class="btn" type="submit"><i class="fa-solid fa-plus"></i> Add &amp; Score Lead</button>
        </form>
      </section>

      <!-- List -->
      <section class="panel wide">
        <div class="toolbar">
          <div class="search"><i class="fa-solid fa-magnifying-glass"></i><input id="search" placeholder="Search leads..." /></div>
          <select id="filter">
            <option value="all">All</option><option value="hot">Hot</option><option value="warm">Warm</option><option value="cold">Cold</option>
          </select>
          <select id="sort">
            <option value="score">Sort: Score</option><option value="name">Sort: Name</option><option value="date">Sort: Newest</option>
          </select>
          <button class="btn ghost" id="exportBtn"><i class="fa-solid fa-file-csv"></i> Export</button>
          <button class="btn ghost danger" id="clearBtn"><i class="fa-solid fa-trash"></i></button>
        </div>
        <div id="leadList" class="lead-list"></div>
        <div id="empty" class="empty"><i class="fa-solid fa-inbox"></i><p>No leads yet. Add one or load samples.</p><button class="btn ghost" id="sampleBtn">Load sample leads</button></div>
      </section>
    </div>
  </main>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
